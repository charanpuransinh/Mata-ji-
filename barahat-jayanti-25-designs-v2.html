<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>जन्म जयंती समारोह 2026 — 25 डिज़ाइन थीम्स</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@300;400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;font-family:'Noto Serif Devanagari',serif;color:#fff;overflow-x:hidden}

.gallery-header{text-align:center;padding:50px 20px 30px;background:linear-gradient(135deg,#1a0a00,#2d1500,#1a0a00);border-bottom:2px solid #C9921A;position:relative;overflow:hidden}
.gallery-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(201,146,26,.15) 0%,transparent 70%)}
.gallery-header h1{font-family:'Cinzel Decorative',serif;font-size:clamp(16px,3.5vw,36px);color:#F0C040;letter-spacing:3px;text-shadow:0 0 30px rgba(240,192,64,.5);position:relative}
.gallery-header p{color:#d4a770;font-size:15px;margin-top:10px;font-style:italic;position:relative}
.badge-count{display:inline-block;background:#C9921A;color:#000;font-size:12px;font-weight:700;padding:4px 16px;border-radius:20px;margin-top:12px;letter-spacing:2px}

.designs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:28px;padding:36px;max-width:1800px;margin:0 auto}

/* ── CARD BASE ── */
.card{border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s;position:relative;animation:fadeUp .5s ease both}
.card:hover{transform:translateY(-8px) scale(1.01);box-shadow:0 30px 60px rgba(0,0,0,.7)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── DEITY HEADER (TOP) ── */
.deity-header{width:100%;overflow:hidden}
.deity-header .hinglaj-wrap{width:100%;height:110px;overflow:hidden;position:relative}
.deity-header .hinglaj-wrap img{width:100%;height:100%;object-fit:cover;object-position:center 30%}
.deity-header .hinglaj-wrap .hinglaj-label{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;background:rgba(0,0,0,.6);color:#FFD700;padding:2px 10px;border-radius:10px;letter-spacing:1px;white-space:nowrap}
.deity-row{display:flex;justify-content:space-around;align-items:flex-end;padding:6px 8px;gap:4px}
.deity-item{text-align:center;flex:1}
.deity-item img{width:100%;height:80px;object-fit:cover;object-position:top;border-radius:6px;border:2px solid rgba(255,215,0,.4)}
.deity-item span{display:block;font-size:8px;font-weight:700;margin-top:2px;color:#FFD700;letter-spacing:.5px}

/* ── CARD INNER ── */
.card-inner{padding:14px 16px 16px}
.design-num{font-size:10px;font-weight:700;opacity:.55;letter-spacing:2px;margin-bottom:6px;text-align:right}

/* ── SHAHEED BLOCK ── */
.shaheed-block{display:flex;gap:10px;align-items:center;margin-bottom:10px;padding:8px;border-radius:8px;background:rgba(255,255,255,.05)}
.shaheed-block img{width:60px;height:68px;object-fit:cover;object-position:top;border-radius:6px;border:2px solid rgba(255,200,0,.5);flex-shrink:0}
.shaheed-text h2{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:2px}
.shaheed-text .subtitle{font-size:10px;opacity:.7;font-style:italic}

/* ── SHAYARI ── */
.shayari-box{text-align:center;padding:8px 10px;border-radius:8px;margin-bottom:10px;font-size:11px;line-height:1.8;font-style:italic;font-weight:600}

/* ── PRESIDING ── */
.presiding{font-size:11px;margin-bottom:8px;line-height:1.6;padding:7px 10px;border-radius:6px}
.date-badge{display:inline-block;font-size:12px;font-weight:700;padding:4px 16px;border-radius:20px;margin-bottom:10px}
.divider{height:1px;margin:8px 0;opacity:.25}
.section-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;opacity:.55;margin-bottom:3px}
.program-list{list-style:none;margin-bottom:8px}
.program-list li{font-size:10px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;gap:6px}
.program-list li span:last-child{opacity:.7;white-space:nowrap}
.guests-row{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.guest-chip{font-size:9px;padding:2px 8px;border-radius:14px;font-weight:600}
.venue-box{font-size:10px;padding:6px 10px;border-radius:6px;margin-bottom:8px;text-align:center;font-weight:600}

/* ── BOTTOM COMMITTEE PHOTOS ── */
.committee-section{margin-top:8px;border-radius:8px;overflow:hidden;background:rgba(0,0,0,.25)}
.committee-section .com-label{font-size:9px;letter-spacing:2px;text-align:center;padding:4px;opacity:.6;text-transform:uppercase}
.committee-row{display:flex;gap:4px;align-items:center;padding:4px 6px}
.committee-row .bhairoo-wrap{flex-shrink:0}
.committee-row .bhairoo-wrap img{width:52px;height:58px;object-fit:cover;object-position:top;border-radius:6px;border:2px solid rgba(255,200,0,.4)}
.committee-row .small-imgs{flex:1}
.committee-row .small-imgs img{width:100%;height:50px;object-fit:cover;border-radius:4px}
.bhairoo-name{font-size:8px;text-align:center;opacity:.8;margin-top:2px;line-height:1.3}

.organizer{font-size:10px;text-align:center;opacity:.8;line-height:1.5;margin-top:6px}
.contact{font-size:9px;text-align:center;margin-top:4px;font-family:monospace;letter-spacing:.5px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;overflow-y:auto;padding:30px 16px}
.modal-overlay.active{display:flex;align-items:flex-start;justify-content:center}
.modal-box{max-width:440px;width:100%;border-radius:16px;overflow:hidden;position:relative;margin:auto;animation:mIn .3s ease}
@keyframes mIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.modal-close{position:fixed;top:16px;right:20px;font-size:32px;color:#fff;cursor:pointer;z-index:1001;background:rgba(0,0,0,.7);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center}

footer{text-align:center;padding:36px 20px;color:#555;font-size:12px;border-top:1px solid #222;margin-top:20px}
@media(max-width:600px){.designs-grid{grid-template-columns:1fr;padding:12px}}

const grid = document.getElementById('grid');
themes.forEach((t,i) => {
  const card = document.createElement('div');
  card.className = `card ${t.cls}`;
  card.style.animationDelay = (i*0.05)+'s';
  card.innerHTML = buildCard(t,i);
  card.onclick = () => openModal(t,i);
  grid.appendChild(card);
});

function openModal(t,i) {
  const box = document.getElementById('modal-box');
  box.className = `modal-box ${t.cls}`;
  box.innerHTML = buildCard(t,i);
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow='';
}
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});
</script>
</body>
</html>
